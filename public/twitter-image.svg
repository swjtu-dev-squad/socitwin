<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Gradient accent -->
  <defs>
    <linearGradient id="twitter-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#twitter-gradient)"/>

  <!-- Network visualization -->
  <g transform="translate(600, 280)">
    <!-- Outer nodes -->
    <circle cx="-200" cy="-100" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="200" cy="-100" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="-200" cy="100" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="200" cy="100" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="0" cy="-150" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="0" cy="150" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="-250" cy="0" r="30" fill="#10b981" opacity="0.3"/>
    <circle cx="250" cy="0" r="30" fill="#10b981" opacity="0.3"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="50" fill="#10b981" opacity="0.8"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-200" y2="-100" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="200" y2="-100" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="-200" y2="100" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="200" y2="100" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-150" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="-250" y2="0" stroke="#10b981" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="0" x2="250" y2="0" stroke="#10b981" stroke-width="3" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#10b981" text-anchor="middle">OASIS Dashboard</text>

  <!-- Subtitle -->
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="28" fill="#71717a" text-anchor="middle">社会智能模拟实时监控平台</text>

  <!-- Features -->
  <g transform="translate(200, 500)">
    <circle cx="0" cy="0" r="8" fill="#10b981"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="18" fill="#a1a1aa">实时监控 OASIS 引擎状态</text>
  </g>
  <g transform="translate(600, 500)">
    <circle cx="0" cy="0" r="8" fill="#10b981"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="18" fill="#a1a1aa">基于真实 LLM 的社会模拟</text>
  </g>
  <g transform="translate(200, 550)">
    <circle cx="0" cy="0" r="8" fill="#10b981"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="18" fill="#a1a1aa">智能体行为可视化分析</text>
  </g>
  <g transform="translate(600, 550)">
    <circle cx="0" cy="0" r="8" fill="#10b981"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="18" fill="#a1a1aa">群体极化趋势追踪</text>
  </g>

  <!-- Footer -->
  <text x="600" y="610" font-family="Arial, sans-serif" font-size="14" fill="#52525b" text-anchor="middle">SWJTU AI Lab • @SWJTU_AI_Lab</text>
</svg>
