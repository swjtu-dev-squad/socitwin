# 行为策略配置示例
# Behavior Control Configuration Example
#
# 此文件定义了如何为智能体应用行为策略配置
# This file defines how to apply behavior strategy configurations to agents

# 选项A: 使用预设配置
# Option A: Use preset configuration
# 可选预设: default, probabilistic, rule_based, scheduled
# Available presets: default, probabilistic, rule_based, scheduled
preset: "rule_based"

# 平台类型: twitter, reddit
# Platform type: twitter, reddit
platform: "twitter"

# 目标agents
# Target agents:
# - "controlled": 仅应用于受控agents (controlled agents only)
# - "all": 应用于所有agents (all agents)
# - 逗号分隔的ID列表: 应用于指定IDs的agents (comma-separated agent IDs)
target_agents: "controlled"

# ========================================
# 选项B: 自定义配置 (高级用法)
# Option B: Custom Configuration (Advanced)
# ========================================
# 如果使用自定义配置，将preset设置为null并定义custom_config
# To use custom configuration, set preset to null and define custom_config

