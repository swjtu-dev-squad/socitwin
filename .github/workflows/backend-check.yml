name: Backend Check

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pyright (硬性失败)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install uv
        run: |
          pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Install pyright
        run: |
          uv add --dev pyright

      - name: Run Pyright
        run: |
          uv run pyright app/
        # ❌ 失败会阻断 CI

      # Ruff (硬性失败)
      - name: Run Ruff
        run: |
          uv run ruff check . --ignore=E501
        # ❌ 失败会阻断 CI - 代码风格问题现在会阻止 PR 合并
